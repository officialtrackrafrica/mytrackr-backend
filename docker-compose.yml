services:
  app:
    build:
      context: .
      target: development
    container_name: mytrackr-app
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      - .:/usr/src/app:cached
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=mytrackr
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - MONO_SECRET_KEY=${MONO_SECRET_KEY}
      - MONO_API_URL=https://api.withmono.com
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID}
      - WEBAUTHN_EXPECTED_ORIGIN=${WEBAUTHN_EXPECTED_ORIGIN}
      - MONO_WEBHOOK_SECRET=${MONO_WEBHOOK_SECRET}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FILEBASE_ACCESS_KEY=${FILEBASE_ACCESS_KEY}
      - FILEBASE_SECRET_KEY=${FILEBASE_SECRET_KEY}
      - FILEBASE_BUCKET_NAME=${FILEBASE_BUCKET_NAME}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - PAYSTACK_CALLBACK_URL=${PAYSTACK_CALLBACK_URL}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM:-noreply@mytrackr.app}
      - CATEGORIZATION_ENGINE_URL=categorization-engine:50051
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  categorization-engine:
    build:
      context: .
      dockerfile: ./categorization-engine/Dockerfile
    container_name: mytrackr-categorization-engine
    ports:
      - '50051:50051'
    volumes:
      - categorization_engine_data:/app/data

  db:
    image: postgres:15-alpine
    container_name: mytrackr-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mytrackr
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mytrackr']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mytrackr-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mytrackr-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
  redis_data:
  categorization_engine_data:
